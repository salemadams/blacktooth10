name: Build Windows VST3

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Configure CMake
        run: cmake -B build -DJUCE_PATH="${{ github.workspace }}/JUCE" -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target TenBand_VST3

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: 10band-windows-vst3
          path: build/TenBand_artefacts/Release/VST3/10band.vst3
